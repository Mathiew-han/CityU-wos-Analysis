      background: var(--bg);

      margin-bottom: 8px;
    }
    .subtitle { color: var(--muted); margin-bottom: 24px; }

      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }
    .toolbar label {
      color: var(--muted);
      font-size: 0.9rem;
    }
    select, input[type="text"] {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.9rem;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .toolbar-spacer {
      flex: 1 1 auto;
    }
    .stats {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 140px;
    }
    .stat .num { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .stat .label { color: var(--muted); font-size: 0.85rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: rgba(88, 166, 255, 0.1);
      color: var(--accent);
      font-weight: 600;
      font-size: 0.9rem;
    }
    tr:hover { background: rgba(255,255,255,0.03); }
    tr:last-child td { border-bottom: none; }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .rank { font-weight: 600; color: var(--accent2); }
    .college { color: var(--muted); font-size: 0.9rem; }
    .num-cell { font-variant-numeric: tabular-nums; }
  </style>

    const colleges = ["金融学院", "数据科学学院", "人文社会科学学院", "商学院", "城市与可持续发展研究院", "国际旅游与管理学院", "教育学院", "创新设计学院", "葡语国家研究院"];
    const claimedStats = {"total": 2121, "claimed": 518, "unclaimed": 1603, "claimed_pct": 24.42};

    function hasMetrics(t) {
      return t.发文量 != null || t.引用 != null || t.h指数 != null;
    }

    function sortRows(rows, key) {
      const arr = rows.slice();
      if (key === "姓名") {
        return arr.sort((a, b) => (a.姓名 || "").localeCompare(b.姓名 || "", "zh-Hans-CN-u-co-pinyin"));
      }
      if (["_score", "发文量", "引用", "h指数"].includes(key)) {
        return arr.sort((a, b) => {
          const av = a[key] != null ? a[key] : -Infinity;
          const bv = b[key] != null ? b[key] : -Infinity;
          if (bv === av) {
            return (a.姓名 || "").localeCompare(b.姓名 || "", "zh-Hans-CN-u-co-pinyin");
          }
          return bv - av;
        });
      }
      return arr;
    }

    function render(rows) {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = rows.map((r, i) => {
        const rank = i + 1;
        const nameCell = r.wos个人主页
          ? `<a href="${r.wos个人主页}" target="_blank" rel="noopener">${r.姓名}</a>`
          : r.姓名;
        const wosTitle = r.wos页面标题 ? r.wos页面标题 : '-';
        return `
        <tr>
          <td class="rank num-cell">${rank}</td>
          <td>${nameCell}</td>
          <td class="college">${r.學院 || '-'}</td>
          <td class="num-cell">${r.发文量 != null ? r.发文量 : '-'}</td>
          <td class="num-cell">${r.引用 != null ? r.引用 : '-'}</td>
          <td class="num-cell">${r.h指数 != null ? r.h指数 : '-'}</td>
          <td class="college">${wosTitle}</td>
          <td><a href="${r.wos个人主页 || '#'}" target="_blank" rel="noopener">${r.wos个人主页 ? '打开' : '-'}</a></td>
        </tr>
      `}).join('');
    }

    function update() {
      const filter = document.getElementById('collegeFilter').value;
      const sortKey = document.getElementById('sortKey').value;
      const search = document.getElementById('searchName').value.trim().toLowerCase();
      const onlyWithMetrics = document.getElementById('onlyWithMetrics').checked;

      let rows = filter ? teachers.filter(t => t.學院 === filter) : teachers.slice();

      if (onlyWithMetrics) {
        rows = rows.filter(hasMetrics);
      }

      if (search) {
        rows = rows.filter(t => {
          const n1 = (t.姓名 || "").toLowerCase();
          const n2 = (t.wos页面标题 || "").toLowerCase();
          return n1.includes(search) || n2.includes(search);
        });
      }

      rows = sortRows(rows, sortKey);

      const withMetrics = rows.filter(hasMetrics).length;
      document.getElementById('statTotal').textContent = rows.length;
      document.getElementById('statColleges').textContent = filter ? 1 : colleges.length;
      document.getElementById('statWithMetrics').textContent = withMetrics;

      const claimedEl = document.getElementById('statClaimedRate');
      if (claimedStats && claimedStats.claimed_pct != null) {
        claimedEl.textContent = claimedStats.claimed_pct.toFixed(1) + "%";
      } else {
        claimedEl.textContent = "-";
      }

      render(rows);
    }

    const sel = document.getElementById('collegeFilter');
    colleges.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      sel.appendChild(opt);
    });

    sel.addEventListener('change', update);
    document.getElementById('sortKey').addEventListener('change', update);
    document.getElementById('onlyWithMetrics').addEventListener('change', update);
    document.getElementById('searchName').addEventListener('input', update);

    document.getElementById('statColleges').textContent = colleges.length;
    update();
  </script>
