      border-radius: 999px;
      background: var(--accent2);

      height: 260px !important;

      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;

      align-items: center;
      gap: 6px;
    }

        const grouped = new Map();
        scatterPoints.forEach(p => {
          const col = p.college || "未分配学院";
          if (filterCollege && col !== filterCollege) return;
          if (!grouped.has(col)) grouped.set(col, []);
          grouped.get(col).push(p);
        });
        const labels = Array.from(grouped.keys());
        return labels.map((c, idx) => {
          const color = colorForIndex(idx);
          return {
            label: c,
            data: grouped.get(c).map(p => ({
              x: p.x,
              y: p.y,
              name: p.name
            })),
            backgroundColor: color,
            pointRadius: 4,
          };
        });
      }

      const config = {
        type: "scatter",
        data: {
          datasets: buildDatasets("")
        },
        options: {
          responsive: true,
          plugins: {
            tooltip: {
              callbacks: {
                label: ctx => {
                  const v = ctx.raw;
                  return `${v.name}：发文 ${v.x} 篇，引用 ${v.y} 次`;
                }
              }
            }
          },
          scales: {
            x: {
              title: { display: true, text: "发文量" },
              ticks: { color: "#9ca3af" },
              grid: { color: "rgba(55,65,81,0.4)" }
            },
            y: {
              title: { display: true, text: "引用次数" },
              ticks: { color: "#9ca3af" },
              grid: { color: "rgba(55,65,81,0.4)" }
            }
          }
        }
      };

      const chart = new Chart(ctx, config);

      select.addEventListener("change", () => {
        const val = select.value;
        chart.data.datasets = buildDatasets(val);
        chart.update();
      });

      // 自定义图例
      const legendEl = document.getElementById("scatterLegend");
      legendEl.innerHTML = collegeSet
        .map((c, idx) => {
          const color = colorForIndex(idx);
          return `
            <span class="legend-item">
              <span class="legend-color" style="background:${color}"></span>
              <span>${c}</span>
            </span>
          `;
        })
        .join("");
    })();
  </script>
</body>
</html>
