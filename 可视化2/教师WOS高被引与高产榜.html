    function buildChart(canvasId, items, color, label) {
      const ctx = document.getElementById(canvasId).getContext("2d");
      const labels = items.map(x => x.name);
      const values = items.map(x => x.value);
      new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label,
            data: values,
            backgroundColor: color,
            borderRadius: 4
          }]
        },
        options: {
          indexAxis: "y",
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => " " + label + "：" + ctx.parsed.x.toLocaleString()
              }
            }
          },
          scales: {
            x: {
              ticks: { color: "#9ca3af" },
              grid: { color: "rgba(55,65,81,0.4)" }
            },
            y: {
              ticks: {
                color: "#9ca3af",
                callback: (v, idx) => labels[idx] || ""
              },
              grid: { display: false }
            }
          }
        }
      });
    }

    function buildList(containerId, items, labelName) {
      const el = document.getElementById(containerId);
      el.innerHTML = items.map((x, i) => {
        const nameHtml = x.wos
          ? `<a href="${x.wos}" target="_blank" rel="noopener" class="name-link">${x.name}</a>`
          : x.name;
        const college = x.college ? `<span class="badge-college">${x.college}</span>` : "";
        return `<li>#${i+1} ${nameHtml}${college} – ${labelName}：${x.value.toLocaleString()}</li>`;
      }).join("");
    }

    buildChart("chartTopCitations", data.citations, "rgba(56,189,248,0.85)", "引用次数");
    buildChart("chartTopH", data.hindex, "rgba(244,114,182,0.9)", "h 指数");
    buildChart("chartTopPubs", data.pubs, "rgba(34,197,94,0.9)", "发文量");

    buildList("listCitations", data.citations, "引用次数");
    buildList("listH", data.hindex, "h 指数");
    buildList("listPubs", data.pubs, "发文量");
  </script>
