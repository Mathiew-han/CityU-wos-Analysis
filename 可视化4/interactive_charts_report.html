    function barh(el, labels, values, color, extraHover) {{
      const y = [...labels].reverse();
      const x = [...values].reverse();
      const hover = y.map((lab, i) => {{
        const base = `<b>${{lab}}</b><br>Count: ${{x[i]}}`;
        const extra = extraHover ? `<br>${{extraHover(i)}}` : "";
        return base + extra + "<extra></extra>";
      }});
      Plotly.newPlot(el, [{{
        type: "bar",
        orientation: "h",
        y,
        x,
        marker: {{color}},
        hovertemplate: hover,
      }}], {{
        ...BASE_LAYOUT,
        margin: {{l: 200, r: 20, t: 28, b: 48}},
      }}, CONFIG);
    }}

    function line(el, x, y, color) {{
      Plotly.newPlot(el, [{{
        type: "scatter",
        mode: "lines+markers",
        x, y,
        line: {{color, width: 2}},
        marker: {{color, size: 6}},
        hovertemplate: "Year: %{x}<br>Count: %{y}<extra></extra>",
      }}], {{
        ...BASE_LAYOUT,
        xaxis: {{...BASE_LAYOUT.xaxis, tickangle: -45}},
      }}, CONFIG);
    }}

    function bars(el, labels, values, color) {{

        x: labels,
        y: values,
        marker: {{color}},
        hovertemplate: "<b>%{x}</b><br>Count: %{y}<extra></extra>",

        xaxis: {{...BASE_LAYOUT.xaxis, tickangle: -30}},
      }}, CONFIG);
    }}

        x: values,
        marker: {{color}},
        opacity: 0.85,
        hovertemplate: "Publications: %{x}<br>Bin count: %{y}<extra></extra>",

        ...BASE_LAYOUT,
        xaxis: {{...BASE_LAYOUT.xaxis, title: "Publications"}},
        yaxis: {{...BASE_LAYOUT.yaxis, title: "Authors"}},
      }}, CONFIG);
    }}

        values,
        marker: {{colors}},
        textinfo: "none",

        margin: {{l: 20, r: 20, t: 28, b: 20}},
        showlegend: true,
        legend: {{orientation: "v"}},
      }}, CONFIG);
    }}

    function cumulative(el, pct, color) {{

        x,
        y: pct,

        fillcolor: "rgba(204,121,167,0.18)",

      }}], {{
        ...BASE_LAYOUT,
        yaxis: {{...BASE_LAYOUT.yaxis, range: [0, 100], ticksuffix: "%"}},
      }}, CONFIG);
    }}

      barh("a_college", DATA.authors.teachers_by_college.labels, DATA.authors.teachers_by_college.values, "#009E73");

      bars("f_overview", DATA.final.overview_counts.labels, DATA.final.overview_counts.values, "#0072B2");
      pie("f_coverage_pie", DATA.final.wos_coverage_pie.labels, DATA.final.wos_coverage_pie.values, ["#009E73","#E69F00"]);
      barh("f_faculty_dist", DATA.final.faculty_distribution.labels, DATA.final.faculty_distribution.values, "#56B4E9");
      barh("f_faculty_cov", DATA.final.faculty_coverage.labels, DATA.final.faculty_coverage.values, "#009E73",
        (i) => {{
          const m = DATA.final.faculty_coverage.meta.slice().reverse()[i];
          return `withWOS/total: ${{m.with_wos}}/${{m.total}}`;
        }}
      );
    }}

    window.addEventListener("load", render);
  </script>
</body>
</html>
